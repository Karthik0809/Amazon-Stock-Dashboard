name: Refresh AMZN Data

on:
  schedule:
    - cron: "0 22 * * 1-5"   # 10 PM UTC = after US market close, weekdays only
  workflow_dispatch:           # manual trigger from GitHub Actions tab

permissions:
  contents: write              # needed to push the updated CSV back

jobs:
  update-csv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch latest AMZN data
        run: python scripts/fetch_amzn.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add amazon_stock.csv
          git diff --cached --quiet && echo "No new data" || (
            git commit -m "chore: auto-refresh AMZN data $(date -u +%Y-%m-%d)" &&
            git push
          )
