name: Refresh AMZN Data

on:
  schedule:
    - cron: "0 22 * * 1-5"   # 10 PM UTC = after US market close (4 PM ET), weekdays only
  workflow_dispatch:           # also lets you trigger it manually from GitHub

jobs:
  update-csv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch latest AMZN data
        run: |
          python - <<'EOF'
          import yfinance as yf, pandas as pd
          df = yf.Ticker("AMZN").history(period="max")
          df.index = pd.to_datetime(df.index).tz_localize(None)
          df.index.name = "date"
          df = df[["Open", "High", "Low", "Close", "Volume"]]
          df.columns = ["open", "high", "low", "close", "volume"]
          df["adj_close"] = df["close"]
          df.to_csv("amazon_stock.csv")
          print(f"Updated through {df.index[-1].date()}, {len(df)} rows")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add amazon_stock.csv
          git diff --cached --quiet || git commit -m "chore: auto-refresh AMZN data $(date -u +%Y-%m-%d)"
          git push
